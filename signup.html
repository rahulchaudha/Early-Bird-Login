<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Early Bird - Sign Up</title>
  
  <!-- Yahi CSS file use hogi. Nayi nahi banani -->
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="login-card">
    
    <img src="https://abs.twimg.com/icons/apple-touch-icon-192x192.png" alt="Logo" class="logo">
    
    <h2 class="login-title">Sign Up</h2>
    
    <div class="input-group">
      <input type="text" class="input-box" placeholder="Username">
    </div>
    
    <div class="input-group">
      <input type="email" class="input-box" placeholder="Email address">
    </div>
    
    <div class="input-group">
      <input type="password" class="input-box" placeholder="Password">
    </div>
    
    <div class="input-group">
      <input type="password" class="input-box" placeholder="Confirm Password">
    </div>
    
    <button class="login-btn">Sign Up</button>
    
    <p class="signup-text">
      Already have an account? <a href="index.html">Login</a>
    </p>
    
  </div>

</body>
</html>
